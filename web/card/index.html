<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vizzi Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: #0a0a0a; }
    .container { width: 100%; max-width: 400px; text-align: center; }
    .logo { font-size: 36px; font-weight: 800; color: #fff; letter-spacing: -2px; margin-bottom: 4px; }
    .logo span { color: #FF5C87; }
    .tagline { color: #555; font-size: 13px; margin-bottom: 40px; }
    .card { border-radius: 20px; padding: 20px; margin-bottom: 32px; text-align: left; position: relative; overflow: hidden; min-height: 160px; display: flex; flex-direction: column; justify-content: space-between; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .card-vizzi { font-size: 10px; font-weight: bold; letter-spacing: 1px; }
    .card-name { font-size: 20px; font-weight: 700; }
    .card-role { font-size: 11px; margin-top: 3px; }
    .card-contacts { margin-top: 6px; }
    .contact-row { display: flex; align-items: center; gap: 5px; margin-top: 4px; font-size: 8px; opacity: 0.7; }
    .divider { height: 1px; width: 28px; margin: 6px 0; }
    .btn { display: block; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 700; text-align: center; text-decoration: none; margin-bottom: 12px; cursor: pointer; border: none; width: 100%; }
    .btn-primary { background: #FF5C87; color: #fff; }
    .btn-secondary { background: transparent; color: #555; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">vizzi<span>.</span></div>
    <div class="tagline">digital business card</div>
    <div id="content"><p style="color:#555;font-size:14px">Loading...</p></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qpcukamntnlaqzvcfdxp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwY3VrYW1udG5sYXF6dmNmZHhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTU5NDksImV4cCI6MjA4OTY3MTk0OX0.esegmcvGStbSX8TMTpQ3tHo3SQ-7tJ6iKle8ANHU6Mo';

    const id = window.location.pathname.split('/card/')[1];

    function isLight(color) {
      if (['#f8f8f6','#ffffff','#fff','#fef3c7','#fdf2f8'].includes(color)) return true;
      if (color.startsWith('#')) {
        const hex = color.replace('#','');
        const r = parseInt(hex.substring(0,2),16);
        const g = parseInt(hex.substring(2,4),16);
        const b = parseInt(hex.substring(4,6),16);
        return (0.299*r + 0.587*g + 0.114*b)/255 > 0.85;
      }
      return false;
    }

    function contacts(card, color) {
      const items = [
        { val: card.phone, emoji: '📞' },
        { val: card.email, emoji: '✉️' },
        { val: card.address, emoji: '📍' },
        { val: card.instagram, emoji: '📸', prefix: '@' },
        { val: card.tiktok, emoji: '🎵', prefix: '@' },
        { val: card.linkedin, emoji: '💼' },
        { val: card.whatsapp, emoji: '💬', suffix: ' (WhatsApp)' },
        { val: card.website, emoji: '🌐' },
      ];
      return items.filter(i => i.val).map(i =>
        `<div class="contact-row" style="color:${color}">
          <span>${i.emoji}</span>
          <span>${i.prefix||''}${i.val}${i.suffix||''}</span>
        </div>`
      ).join('');
    }

    function renderCard(card) {
      const layout = card.layout || 'classic';
      const theme = card.theme || '#FF5C87';
      const light = isLight(theme);
      const textColor = light ? '#111' : '#fff';
      const subColor = light ? '#666' : 'rgba(255,255,255,0.6)';

      if (layout === 'classic') {
        return `
          <div class="card" style="background:${theme}; border:${light?'1px solid #e0e0e0':'none'}">
            <div class="card-header">
              <span class="card-vizzi" style="color:${textColor};opacity:0.25">VIZZI</span>
            </div>
            <div>
              <div class="card-name" style="color:${textColor}">${card.name||''}</div>
              <div class="card-role" style="color:${subColor}">${card.job_title||''}</div>
              <div class="card-contacts">${contacts(card, light?'#333':'#fff')}</div>
            </div>
          </div>`;
      }

      if (layout === 'minimal') {
        return `
          <div class="card" style="background:${theme}; padding-left:24px; border-left:5px solid ${light?'rgba(0,0,0,0.15)':'rgba(255,255,255,0.25)'}; border-radius:20px">
            <span class="card-vizzi" style="color:${textColor};opacity:0.2;margin-bottom:16px;display:block">VIZZI</span>
            <div>
              <div class="card-name" style="color:${textColor}">${card.name||''}</div>
              <div class="card-role" style="color:${subColor}">${card.job_title||''}</div>
              <div class="card-contacts">${contacts(card, light?'#333':'#fff')}</div>
            </div>
          </div>`;
      }

      if (layout === 'dark') {
        return `
          <div class="card" style="background:#0a0a0a">
            <div class="card-header">
              <span class="card-vizzi" style="color:#333">VIZZI</span>
            </div>
            <div>
              <div class="card-name" style="color:#fff">${card.name||''}</div>
              <div class="card-role" style="color:${theme}">${card.job_title||''}</div>
              <div class="card-contacts">${contacts(card, theme)}</div>
            </div>
          </div>`;
      }

      if (layout === 'elegant') {
        return `
          <div class="card" style="background:${theme}">
            <div class="card-header">
              <span class="card-vizzi" style="color:${textColor};opacity:0.2">VIZZI</span>
            </div>
            <div>
              <div class="card-name" style="color:${textColor};font-style:italic">${card.name||''}</div>
              <div class="divider" style="background:${light?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.3)'}"></div>
              <div class="card-role" style="color:${subColor};letter-spacing:2px;text-transform:uppercase;font-size:10px">${card.job_title||''}</div>
              <div class="card-contacts">${contacts(card, light?'#333':'#fff')}</div>
            </div>
          </div>`;
      }

      if (layout === 'bold') {
        return `
          <div class="card" style="background:${theme}">
            <span class="card-vizzi" style="color:${textColor};opacity:0.2;margin-bottom:16px;display:block">VIZZI</span>
            <div>
              <div class="card-name" style="color:${textColor};font-size:22px;font-weight:900">${card.name||''}</div>
              <div class="card-role" style="color:${subColor};font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase">${card.job_title||''}</div>
              <div class="card-contacts">${contacts(card, light?'#333':'#fff')}</div>
            </div>
          </div>`;
      }

      if (layout === 'blanc') {
        return `
          <div class="card" style="background:#f8f8f6;border:1px solid #e0e0d8">
            <div class="card-header">
              <span class="card-vizzi" style="color:#111;opacity:0.2">VIZZI</span>
            </div>
            <div>
              <div class="card-name" style="color:#111">${card.name||''}</div>
              <div class="card-role" style="color:#666">${card.job_title||''}</div>
              <div class="card-contacts">${contacts(card, '#333')}</div>
            </div>
          </div>`;
      }

      // simple / default
      return `
        <div class="card" style="background:#1a1a1a;border:1px solid #2a2a2a">
          <span class="card-vizzi" style="color:#333;margin-bottom:16px;display:block">VIZZI</span>
          <div>
            <div class="card-name" style="color:${theme}">${card.name||''}</div>
            <div class="card-role" style="color:#555">${card.job_title||''}</div>
            <div class="card-contacts">${contacts(card, '#555')}</div>
          </div>
        </div>`;
    }

    async function loadCard() {
      if (!id) {
        document.getElementById('content').innerHTML = '<p style="color:#fff;font-size:18px">Card not found</p>';
        return;
      }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/cards?id=eq.${id}&select=*`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });

      const data = await res.json();
      const card = data[0];

      if (!card) {
        document.getElementById('content').innerHTML = '<p style="color:#fff;font-size:18px">Card not found</p>';
        return;
      }

      document.getElementById('content').innerHTML = `
        ${renderCard(card)}
        <a class="btn btn-primary" href="vizzi://card/${id}">Open in Vizzi app</a>
        <a class="btn btn-secondary" href="https://dancing-bavarois-5ae1b1.netlify.app">Get the Vizzi app</a>
      `;
    }

    loadCard();
  </script>
</body>
</html>
