<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vizzi Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .container { width: 100%; max-width: 400px; text-align: center; }
    .logo { font-size: 36px; font-weight: 800; color: #fff; letter-spacing: -2px; margin-bottom: 4px; }
    .logo span { color: #FF5C87; }
    .tagline { color: #555; font-size: 13px; margin-bottom: 40px; }
    .card { border-radius: 20px; padding: 24px; margin-bottom: 32px; text-align: left; }
    .card-name { color: #fff; font-size: 22px; font-weight: 700; }
    .card-title { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 4px; }
    .card-info { color: #fff; font-size: 14px; margin-top: 12px; }
    .btn { display: block; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 700; text-align: center; text-decoration: none; margin-bottom: 12px; cursor: pointer; border: none; width: 100%; }
    .btn-primary { background: #FF5C87; color: #fff; }
    .btn-secondary { background: transparent; color: #555; font-size: 13px; }
    .loading { color: #555; font-size: 14px; }
    .error { color: #fff; font-size: 18px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">vizzi<span>.</span></div>
    <div class="tagline">digital business card</div>
    <div id="content"><p class="loading">Loading...</p></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qpcukamntnlaqzvcfdxp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwY3VrYW1udG5sYXF6dmNmZHhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTU5NDksImV4cCI6MjA4OTY3MTk0OX0.esegmcvGStbSX8TMTpQ3tHo3SQ-7tJ6iKle8ANHU6Mo';

    const id = window.location.pathname.split('/card/')[1];

    async function loadCard() {
      if (!id) {
        document.getElementById('content').innerHTML = '<p class="error">Card not found</p>';
        return;
      }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/cards?id=eq.${id}&select=*`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });

      const data = await res.json();
      const card = data[0];

      if (!card) {
        document.getElementById('content').innerHTML = '<p class="error">Card not found</p>';
        return;
      }

      document.getElementById('content').innerHTML = `
        <div class="card" style="background: ${card.theme || '#FF5C87'}">
          <div class="card-name">${card.name || ''}</div>
          <div class="card-title">${card.job_title || ''}</div>
          ${card.phone ? `<div class="card-info">📞 ${card.phone}</div>` : ''}
          ${card.email ? `<div class="card-info">✉️ ${card.email}</div>` : ''}
          ${card.address ? `<div class="card-info">📍 ${card.address}</div>` : ''}
          ${card.website ? `<div class="card-info">🌐 ${card.website}</div>` : ''}
          ${card.instagram ? `<div class="card-info">📸 @${card.instagram}</div>` : ''}
          ${card.whatsapp ? `<div class="card-info"><a href="https://wa.me/${card.whatsapp}" style="color:#fff">💬 WhatsApp</a></div>` : ''}
        </div>
        <a class="btn btn-primary" href="vizzi://card/${id}">Open in Vizzi app</a>
        <a class="btn btn-secondary" href="#">Get the Vizzi app</a>
      `;
    }

    loadCard();
  </script>
</body>
</html>
